<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/zh/index.html">
    <style>
        body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f8fafc;color:#0f172a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
        .shell{padding:24px 28px;border-radius:18px;background:#fff;box-shadow:0 24px 60px rgba(15,23,42,.08);text-align:center}
        .shell p{margin:0;color:#475569}
    </style>
</head>
<body>
    <div class="shell">
        <p>Redirecting...</p>
        <noscript><a href="/zh/index.html">Continue</a></noscript>
    </div>
    <script>
        (function(){
            var enabled = ["zh","en","es","hi","ar","fr","de","ja","pt","ru","it","ko","tr","nl","pl","vi","th","sv","id","el","cs","hu","ro","uk","ms"];
            var raw = String(navigator.language || navigator.userLanguage || 'zh').toLowerCase();
            var code = raw.split('-')[0];
            if (enabled.indexOf(code) === -1) { code = 'zh'; }
            window.location.replace('/' + code + '/index.html');
        })();
    </script>
</body>
</html>
