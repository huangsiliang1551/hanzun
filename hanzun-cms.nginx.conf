server {
    listen 80;
    server_name bagelsmachinery.com www.bagelsmachinery.com 43.108.20.215;

    client_max_body_size 55m;

    root /www/wwwroot/bagelsmachinery.com;
    index index.html index.htm;
    error_page 404 /404.html;

    # === Gzip ===
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # === Security ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # === 隐藏文件禁止访问 ===
    location ~ /\. {
        deny all;
    }

    location ~* (^|/)(backend/\.env|\.env|hanzun_cms\.sql|login_response\.json|token\.txt|query|_.*\.(py|js|json)|tmp-.*\.html|.*\.(log|bak|tmp|sql))$ {
        return 404;
    }

    location ^~ /backend/ {
        return 404;
    }

    # === 静态资源缓存 ===
    location ~ ^/assets/(images|css|js|videos)/ {
        expires 365d;
        add_header Cache-Control "public, max-age=315360000";
        try_files $uri =404;
    }

    location ^~ /admin-app/ {
        try_files $uri $uri/ /admin-app/index.html;
    }

    location = /admin {
        return 302 /admin-app/#/login;
    }

    location = /login {
        return 302 /admin-app/#/login;
    }

    location ~ \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }

    # === 上传目录 ===
    location ^~ /uploads/ {
        alias /www/wwwroot/bagelsmachinery.com/backend/public/uploads/;
        access_log off;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # === 后端 API + 管理后台 ===
    location ~ ^/(admin|api|health)(/.*)?$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /www/wwwroot/bagelsmachinery.com/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param PATH_INFO $uri;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_read_timeout 60s;
    }

    # === 前端页面 ===
    location / {
        try_files $uri $uri/ /index.html;
    }
}
